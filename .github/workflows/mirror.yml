name: Mirror to personal repo

on:
  push:
    branches:
      - main  # ou a branch que usas

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to personal repo
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://github.com/mariosalembe23/angopen-mirror.git
          gh_token: ${{ secrets.MIRROR_TOKEN }}